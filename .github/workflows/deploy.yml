name: Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm manual deployment'
        required: true
        default: ''

# Auto-deploy on push to main is DISABLED.
# This project was used for a one-time classroom presentation.
# To redeploy, trigger this workflow manually from the GitHub Actions tab.

env:
  REGION: asia-southeast1
  SERVICE: society-simulator
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  IMAGE: asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/society-simulator/app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'deploy'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_APP_URL=https://societysimulator.elixverse.com \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .

      - name: Push to Artifact Registry
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},NEXT_PUBLIC_APP_URL=https://societysimulator.elixverse.com" \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 1 \
            --concurrency 1000 \
            --timeout 600 \
            --cpu-throttling \
            --execution-environment gen2 \
            --quiet

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "Cloud Run URL: $URL"
          echo "Custom domain: https://societysimulator.elixverse.com"
          # -L follows redirects (Next.js may 307 on root path)
          status=$(curl -L -s -o /dev/null -w "%{http_code}" "$URL")
          if [[ "$status" != 2* ]]; then
            echo "FAIL: HTTP $status"
            exit 1
          fi
          echo "OK: HTTP $status"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment failed — check logs above"
          echo "Revision: $(gcloud run services describe ${{ env.SERVICE }} --region=${{ env.REGION }} --format='value(status.latestReadyRevisionName)' 2>/dev/null || echo unknown)"
